<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>⚡ 我的独立游戏作品站 ⚡</title>
    <style>
        /* 🎨 CSS 设计：打造赛博科技感、玻璃拟态的主页视觉 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body { 
            background: radial-gradient(circle at center, #1a1c29 0%, #0e1017 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }
        /* 主页玻璃外框大容器 */
        #main-container {
            width: 800px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        /* 头像及标题区 */
        .profile-area h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00ffcc, #00ff66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .profile-area p {
            color: #8fa0dd;
            font-size: 16px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        /* 游戏作品卡片排版网格 */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        /* 单个游戏卡片样式 */
        .project-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        /* 鼠标悬停卡片时的炫酷微动发光 */
        .project-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: #00ffcc;
            box-shadow: 0 10px 25px rgba(0, 255, 200, 0.15);
        }
        .project-card h3 {
            font-size: 20px;
            color: #00ffcc;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .project-card p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        /* 进入游戏按钮样式 */
        .play-btn {
            display: inline-block;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff66 0%, #00b359 100%);
            color: #051a0e;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            transition: 0.2s;
        }
        .project-card:hover .play-btn {
            background: linear-gradient(135deg, #00ffcc 0%, #00a2ff 100%);
            box-shadow: 0 4px 12px rgba(0, 255, 200, 0.3);
        }
        /* 页脚区域 */
        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="main-container">
    <!-- 👤 顶端自我介绍区 -->
    <div class="profile-area">
        <h1>CYBER GAME STUDIO</h1>
        <p>欢迎来到我的独立游戏作品站！这里存放着我亲手编写的创意结晶。</p>
    </div>

    <!-- 🎮 游戏作品展示区（网格排版） -->
    <div class="project-grid">
        <!-- 卡片 1 -->
        <div class="project-card" onclick="alert">
            <h3>🐍 贪吃蛇</h3>
            <p>包含完整的玩家起名系统、吃果实刷分逻辑，以及全屏刷果实隐藏彩蛋！</p>
            <a href="snake.html" class="play-btn">立即游玩 →</a>
        </div>      
 <!-- 卡片 2 -->
        <div class="project-card" onclick="alert">
            <h3>❤️ 传说之下-最后的呼吸！</h3>
            <p>这是前往 最后的呼吸sans（非本人制作！）</p>
            <a href="https://caijiqaq.github.io/LAST-BREATH/" class="play-btn">激活决心 →</a>
        </div>

                <!-- 卡片 3 -->
        <div class="project-card" onclick="alert">
            <h3>我用的！编程网站！</h3>
            <p>侯老师网站！</p>
            <a href="https://codinghou.cn/" class="play-btn"> 开始编程 →</a>
        </div>
    </div>
      <!-- 卡片 4 -->
        <div class="project-card" onclick="alert">
            <h3>我的世界</h3>
            <p>mc.js.cc</p>
            <a href="https://mcjs.cc/" class="play-btn"> 开始游玩 →</a>
        </div>

    <!-- 底部声明 -->
    <footer>
        © 2026 由我个人独立开发运营 | frisk...保持住你的决心...不要放弃希望！
    </footer>
</div>

</body>
</html>
